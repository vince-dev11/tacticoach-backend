# Local/production-like stack: MySQL + API (+ optionally the frontend).
#
#   docker compose up -d db          # database only (dev: run the API with npm run dev)
#   docker compose up --build        # full stack
#
# First run seeds the plans:  docker compose exec api npx prisma db seed

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tacticoach
      MYSQL_USER: tacticoach
      MYSQL_PASSWORD: ${DB_PASSWORD:-tacticoach}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://tacticoach:${DB_PASSWORD:-tacticoach}@db:3306/tacticoach
      NODE_ENV: production
      PORT: 3001
    env_file:
      # JWT secrets, AWS/S3, Stripe, SMTP, Gemini, FRONTEND_URL, CORS_ORIGINS…
      - .env
    ports:
      - '3001:3001'

volumes:
  db_data:
